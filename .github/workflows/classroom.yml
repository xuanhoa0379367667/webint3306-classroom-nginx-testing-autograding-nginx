# Workflow chạy autograding khi sinh viên push code.
# GitHub Classroom cũng có thể chạy test riêng; workflow này giúp hiển thị kết quả trong tab Actions.
name: Autograding

on:
  push:
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run tests
        run: npm test
